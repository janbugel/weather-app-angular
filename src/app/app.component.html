<mat-toolbar class="toolbar" color="primary">
  <span class="brand">
    <mat-icon class="brand-icon">wb_sunny</mat-icon>
    <span class="brand-text">
      Weather<span class="brand-location" *ngIf="location"> · {{ location.name }}</span>
    </span>
  </span>

  <span class="spacer"></span>

  <div class="search-slot">
    <app-location-search></app-location-search>
  </div>

  <button
    mat-stroked-button
    class="unit-toggle"
    (click)="toggleUnit()"
    aria-label="Toggle temperature unit"
  >
    {{ unit === 'C' ? '°C' : '°F' }}
  </button>

  <div class="desktop-menu">
    <button
      mat-button
      [class.active]="selectedSection === 'weather-table'"
      (click)="selectSection('weather-table')"
    >Forecast</button>
    <button
      mat-button
      [class.active]="selectedSection === 'weather-historical'"
      (click)="selectSection('weather-historical')"
    >Historical</button>
    <button
      mat-button
      [class.active]="selectedSection === 'temperature-chart'"
      (click)="selectSection('temperature-chart')"
    >Charts</button>
    <button
      mat-button
      [class.active]="selectedSection === 'heat-index-calculator'"
      (click)="selectSection('heat-index-calculator')"
    >Heat Index</button>
  </div>

  <button mat-icon-button [matMenuTriggerFor]="appMenu" class="mobile-menu" aria-label="Open menu">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-menu #appMenu="matMenu">
    <button mat-menu-item (click)="selectSection('weather-table')">Forecast</button>
    <button mat-menu-item (click)="selectSection('weather-historical')">Historical</button>
    <button mat-menu-item (click)="selectSection('temperature-chart')">Charts</button>
    <button mat-menu-item (click)="selectSection('heat-index-calculator')">Heat Index</button>
  </mat-menu>
</mat-toolbar>

<main class="content">
  <ng-container [ngSwitch]="selectedSection">
    <app-weather-table-forecast *ngSwitchCase="'weather-table'"></app-weather-table-forecast>
    <app-weather-table-historical *ngSwitchCase="'weather-historical'"></app-weather-table-historical>
    <app-temperature-chart *ngSwitchCase="'temperature-chart'"></app-temperature-chart>
    <app-heat-index-calculator *ngSwitchCase="'heat-index-calculator'"></app-heat-index-calculator>
  </ng-container>
</main>
